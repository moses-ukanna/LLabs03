<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Llabs03 — Linux Sandbox</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Top Bar ──────────────────────────────────────────── -->
  <header class="topbar">
    <button class="topbar-hamburger" id="btn-hamburger" title="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <line x1="3" y1="5" x2="15" y2="5"/>
        <line x1="3" y1="9" x2="15" y2="9"/>
        <line x1="3" y1="13" x2="15" y2="13"/>
      </svg>
    </button>
    <div class="topbar-logo">LLABS<span>03</span></div>
    <div class="topbar-meta">
      <div class="topbar-meta-item">
        <span class="topbar-meta-label">CWD</span>
        <span class="topbar-meta-value" id="hdr-cwd">~</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="topbar-meta-item">
        <span class="topbar-meta-label">Session</span>
        <span class="topbar-meta-value"><span class="status-dot"></span>Live</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="topbar-meta-item">
        <span class="topbar-meta-label">CMD</span>
        <span class="topbar-meta-value" id="rail-cmd-count">0</span>
      </div>
    </div>
    <div class="rail-clock" id="rail-clock"></div>
  </header>

  <!-- ── App Shell ─────────────────────────────────────────── -->
  <div class="app">

    <!-- ── Icon Rail ─────────────────────────────────────── -->
    <nav class="icon-rail" id="icon-rail">

      <!-- Fedora -->
      <div class="rail-group">
        <button class="rail-btn fedora-btn" id="btn-glio" title="Fedora AI">
          <svg class="fedora-icon" width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="4" y="4"  width="12" height="3" rx="1.5" fill="currentColor"/>
            <rect x="4" y="9"  width="8"  height="3" rx="1.5" fill="currentColor"/>
            <rect x="4" y="14" width="3"  height="2" rx="1"   fill="currentColor"/>
          </svg>
        </button>
      </div>

      <div class="rail-divider"></div>

      <!-- Nav -->
      <div class="rail-group">
        <button class="rail-btn layout-btn active" data-mode="terminal" title="Terminal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="2" width="16" height="14" rx="2.5"/>
            <path d="M4 7l4 3-4 3"/>
            <line x1="10" y1="13" x2="15" y2="13"/>
          </svg>
        </button>
        <button class="rail-btn layout-btn" data-mode="explorer" title="File Explorer">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 5a1.5 1.5 0 011.5-1.5h4l1.5 2H15a1.5 1.5 0 011.5 1.5v7A1.5 1.5 0 0115 15.5H3.5A1.5 1.5 0 012 14V5z"/>
          </svg>
        </button>
        <button class="rail-btn layout-btn" data-mode="reference" title="Command Reference">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="1.5" width="13" height="15" rx="2"/>
            <line x1="6" y1="6" x2="12" y2="6"/>
            <line x1="6" y1="9" x2="12" y2="9"/>
            <line x1="6" y1="12" x2="9"  y2="12"/>
          </svg>
        </button>
        <button class="rail-btn layout-btn" data-mode="split" title="Split View">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
            <rect x="1" y="2" width="16" height="14" rx="2.5"/>
            <line x1="9" y1="2" x2="9" y2="16"/>
          </svg>
        </button>
      </div>

      <div class="rail-divider"></div>

      <!-- Settings -->
      <div class="rail-group">
        <button class="rail-btn" id="btn-theme" title="Toggle Theme">
          <svg id="theme-icon-svg" width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 11A7 7 0 017 3a7 7 0 100 14 7 7 0 008-6z"/>
          </svg>
        </button>
        <button class="rail-btn danger" id="btn-clear" title="Clear Terminal">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 5h14M7 5V3h4v2M6 5l.5 10h5L12 5"/>
          </svg>
        </button>
        <button class="rail-btn danger" id="btn-reset" title="Reset Filesystem">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 9A6 6 0 113.5 6"/>
            <polyline points="1.5,3.5 3.5,6 6,3.5"/>
          </svg>
        </button>
      </div>

      <div class="rail-spacer"></div>

    </nav>

    <!-- ── Main Content ───────────────────────────────────── -->
    <div class="main" id="main">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- Terminal -->
      <div class="terminal-area">
        <div class="terminal-output" id="output"></div>
        <div class="input-area" id="input-area">
          <div class="input-resize-handle" id="input-resize-handle"></div>
          <span class="input-size-badge" id="input-size-badge"></span>
          <div class="input-row">
            <div class="prompt" id="prompt"></div>
            <textarea
              id="input" class="terminal-input" rows="1"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Split panel -->
      <div class="split-panel" id="split-panel">
        <div class="split-panel-header">
          <span>Filesystem</span>
          <span id="split-cwd-label" class="split-cwd"></span>
        </div>
        <div id="split-tree" class="fs-tree"></div>
        <div class="split-panel-header" style="margin-top:16px;">Command Ref</div>
        <div class="split-ref" id="split-ref"></div>
      </div>

      <!-- Fedora chat panel -->
      <div class="glio-panel" id="glio-panel">
        <div class="glio-chat" id="glio-chat">
          <div class="glio-header">
            <div class="glio-avatar">
              <svg class="fedora-icon" width="16" height="16" viewBox="0 0 20 20" fill="none">
                <rect x="4" y="4"  width="12" height="3" rx="1.5" fill="currentColor"/>
                <rect x="4" y="9"  width="8"  height="3" rx="1.5" fill="currentColor"/>
                <rect x="4" y="14" width="3"  height="2" rx="1"   fill="currentColor"/>
              </svg>
            </div>
            <div>
              <div class="glio-title">Fedora <span>3.1</span></div>
              <div class="glio-subtitle">Your friendly AI assistant</div>
            </div>
            <button class="glio-clear-btn" id="glio-clear-btn" title="Close" aria-label="Close">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <line x1="2" y1="2" x2="11" y2="11"/>
                <line x1="11" y1="2" x2="2" y2="11"/>
              </svg>
            </button>
          </div>
          <div class="glio-messages" id="glio-messages"></div>
          <div class="glio-typing" id="glio-typing" style="display:none;">
            <span></span><span></span><span></span>
          </div>
          <div class="glio-input-row">
            <textarea
              id="glio-input" class="glio-input"
              placeholder="Ask Fedora…" rows="1"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            ></textarea>
            <button class="glio-send-btn" id="glio-send-btn" title="Send" aria-label="Send">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="13" x2="8" y2="3"/>
                <polyline points="4,7 8,3 12,7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/filesystem.js"></script>
  <script src="js/commands.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/fedora.js"></script>
  <script>
    document.getElementById('btn-hamburger').addEventListener('click', () => {
      const rail = document.getElementById('icon-rail');
      rail.classList.toggle('collapsed');
    });
  </script>
</body>
</html>
