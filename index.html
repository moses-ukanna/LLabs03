<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Llabs03 — Linux Sandbox</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Top Bar ──────────────────────────────────────────── -->
  <header class="topbar">
    <!-- Hamburger -->
    <button class="topbar-btn" id="btn-drawer" title="Menu" aria-label="Open menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
        <line x1="2" y1="5" x2="16" y2="5"/>
        <line x1="2" y1="9" x2="16" y2="9"/>
        <line x1="2" y1="13" x2="16" y2="13"/>
      </svg>
    </button>

    <div class="topbar-logo">LLABS<span>03</span></div>

    <!-- Meta info -->
    <div class="topbar-meta">
      <div class="topbar-meta-item">
        <span class="topbar-meta-label">CWD</span>
        <span class="topbar-meta-value" id="hdr-cwd">~</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="topbar-meta-item">
        <span class="topbar-meta-label">Session</span>
        <span class="topbar-meta-value"><span class="status-dot"></span>Live</span>
      </div>
      <div class="topbar-divider"></div>
      <div class="topbar-meta-item">
        <span class="topbar-meta-label">CMD</span>
        <span class="topbar-meta-value" id="rail-cmd-count">0</span>
      </div>
    </div>

    <!-- Fedora toggle -->
    <button class="topbar-btn" id="btn-glio" title="Fedora AI" aria-label="Toggle Fedora">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="9" r="7"/>
        <path d="M6 9.5c0-1.7 1.3-3 3-3s3 1.3 3 3"/>
        <circle cx="9" cy="12" r="0.8" fill="currentColor" stroke="none"/>
      </svg>
    </button>
  </header>

  <!-- ── Drawer Overlay ───────────────────────────────────── -->
  <div class="drawer-overlay" id="drawer-overlay"></div>

  <!-- ── Drawer ───────────────────────────────────────────── -->
  <nav class="drawer" id="drawer">
    <div class="drawer-header">
      <span class="drawer-title">Navigation</span>
      <button class="topbar-btn" id="btn-drawer-close" aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
          <line x1="3" y1="3" x2="13" y2="13"/>
          <line x1="13" y1="3" x2="3" y2="13"/>
        </svg>
      </button>
    </div>

    <!-- Views -->
    <div class="drawer-section">
      <div class="drawer-section-label">Views</div>

      <div class="drawer-nav-item active layout-btn" data-mode="terminal">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="1" y="2" width="14" height="12" rx="2"/>
          <path d="M4 6l3 3-3 3"/>
          <line x1="9" y1="12" x2="13" y2="12"/>
        </svg>
        Terminal
      </div>

      <div class="drawer-nav-item layout-btn" data-mode="explorer">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4a1 1 0 011-1h3.5l1.5 2H13a1 1 0 011 1v6a1 1 0 01-1 1H3a1 1 0 01-1-1V4z"/>
        </svg>
        File Explorer
      </div>

      <div class="drawer-nav-item layout-btn" data-mode="reference">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="1" width="12" height="14" rx="1.5"/>
          <line x1="5" y1="5" x2="11" y2="5"/>
          <line x1="5" y1="8" x2="11" y2="8"/>
          <line x1="5" y1="11" x2="8" y2="11"/>
        </svg>
        Command Ref
      </div>

      <div class="drawer-nav-item layout-btn" data-mode="split">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <rect x="1" y="2" width="14" height="12" rx="1.5"/>
          <line x1="8" y1="2" x2="8" y2="14"/>
        </svg>
        Split View
      </div>
    </div>

    <div class="drawer-divider"></div>

    <!-- Settings -->
    <div class="drawer-section">
      <div class="drawer-section-label">Settings</div>

      <!-- Theme toggle -->
      <div class="drawer-nav-item" id="btn-theme">
        <svg id="theme-icon-svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 10A6 6 0 016 2.5a6 6 0 100 11 6 6 0 007.5-3.5z"/>
        </svg>
        <span id="theme-label">Dark Mode</span>
      </div>
    </div>

    <!-- Footer actions -->
    <div class="drawer-footer">
      <div class="drawer-clock" id="rail-clock"></div>
      <div class="drawer-footer-item" id="btn-clear">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4h12M6 4V2h4v2M5 4l.5 9h5L11 4"/>
          <line x1="6.5" y1="7" x2="6.5" y2="11"/>
          <line x1="9.5" y1="7" x2="9.5" y2="11"/>
        </svg>
        Clear Terminal
      </div>
      <div class="drawer-footer-item danger" id="btn-reset">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13.5 8A5.5 5.5 0 113 5.5"/>
          <polyline points="1,3 3,5.5 5.5,3"/>
        </svg>
        Reset Filesystem
      </div>
    </div>
  </nav>

  <!-- ── App Shell ─────────────────────────────────────────── -->
  <div class="app">
    <div class="main" id="main">

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar"></aside>

      <!-- Terminal -->
      <div class="terminal-area">
        <div class="terminal-output" id="output"></div>
        <div class="input-area" id="input-area">
          <div class="input-resize-handle" id="input-resize-handle"></div>
          <span class="input-size-badge" id="input-size-badge"></span>
          <div class="input-row">
            <div class="prompt" id="prompt"></div>
            <textarea
              id="input" class="terminal-input" rows="1"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            ></textarea>
          </div>
        </div>
      </div>

      <!-- Split panel -->
      <div class="split-panel" id="split-panel">
        <div class="split-panel-header">
          <span>Filesystem</span>
          <span id="split-cwd-label" class="split-cwd"></span>
        </div>
        <div id="split-tree" class="fs-tree"></div>
        <div class="split-panel-header" style="margin-top:16px;">Command Ref</div>
        <div class="split-ref" id="split-ref"></div>
      </div>

      <!-- Fedora chat panel -->
      <div class="glio-panel" id="glio-panel">
        <div class="glio-chat" id="glio-chat">
          <div class="glio-header">
            <div class="glio-avatar">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="6"/>
                <path d="M5.5 8.5c0-1.4 1.1-2.5 2.5-2.5s2.5 1.1 2.5 2.5"/>
                <circle cx="8" cy="11" r="0.7" fill="currentColor" stroke="none"/>
              </svg>
            </div>
            <div>
              <div class="glio-title">Fedora <span>1.0</span></div>
              <div class="glio-subtitle">Your friendly AI assistant</div>
            </div>
            <button class="glio-clear-btn" id="glio-clear-btn" title="Clear chat" aria-label="Clear chat">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
                <line x1="2" y1="2" x2="11" y2="11"/>
                <line x1="11" y1="2" x2="2" y2="11"/>
              </svg>
            </button>
          </div>
          <div class="glio-messages" id="glio-messages"></div>
          <div class="glio-typing" id="glio-typing" style="display:none;">
            <span></span><span></span><span></span>
          </div>
          <div class="glio-input-row">
            <textarea
              id="glio-input" class="glio-input"
              placeholder="Ask Fedora…" rows="1"
              autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            ></textarea>
            <button class="glio-send-btn" id="glio-send-btn" title="Send" aria-label="Send">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <line x1="8" y1="13" x2="8" y2="3"/>
                <polyline points="4,7 8,3 12,7"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="js/filesystem.js"></script>
  <script src="js/commands.js"></script>
  <script src="js/terminal.js"></script>
  <script src="js/fedora.js"></script>
</body>
</html>
